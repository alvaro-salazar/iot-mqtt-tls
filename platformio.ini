; PlatformIO Project Configuration File
; default_envs limita qué compila "pio run" sin -e
; Los entornos de test (native, native-coverage, esp32-s3-devkitm-1-test)
; se invocan explícitamente con "pio test -e <entorno>"
[platformio]
default_envs = esp32dev


;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32

;Para la S3 quita el simbolo ; de la siguiente línea y comenta la línea: board = esp32-s3-devkitc-1
;board = esp32dev
;Para la S3 quita el simbolo ; de la siguiente línea y comenta la línea: board = esp32dev
board = esp32-s3-devkitc-1

framework = arduino
lib_deps = 
	knolleary/PubSubClient@^2.8
	adafruit/Adafruit SSD1306@^2.5.12
	sensirion/arduino-sht@^1.2.5
	bblanchon/ArduinoJson@^6.21.3
monitor_speed = 115200
upload_speed = 460800
; Las variables deben estar en el entorno antes de ejecutar pio
; Cargar con: set -a && source .env && set +a
; Luego platformio.ini las lee con ${sysenv.VARIABLE}
; ROOT_CA se maneja en add_env_defines.py por ser multilínea
extra_scripts = pre:scripts/add_env_defines.py
build_flags =
    -D COUNTRY=\"${sysenv.COUNTRY}\"
    -D STATE=\"${sysenv.STATE}\"
    -D CITY=\"${sysenv.CITY}\"
    -D MQTT_SERVER=\"${sysenv.MQTT_SERVER}\"
    -D MQTT_PORT=${sysenv.MQTT_PORT}
    -D MQTT_USER=\"${sysenv.MQTT_USER}\"
    -D MQTT_PASSWORD=\"${sysenv.MQTT_PASSWORD}\"
    -D WIFI_SSID=\"${sysenv.WIFI_SSID}\"
    -D WIFI_PASSWORD=\"${sysenv.WIFI_PASSWORD}\"
    ; ROOT_CA se maneja de forma especial por ser multilínea - usar el script

; Variables de entorno para configuración
; Puedes sobrescribir estos valores creando un archivo .env o configurando variables de entorno
; Ejemplo: platformio run -e esp32dev --environment-variables "COUNTRY=mexico,STATE=cdmx,CITY=mexico"

; Variables de entorno para configuración
; Usa el script: python scripts/build_with_env.py

; ─────────────────────────────────────────────────────────────────────
; UNIT TESTS — lógica pura, SIN hardware
; Ejecutar: pio test -e native
; Duración típica: < 2 segundos
; ─────────────────────────────────────────────────────────────────────
[env:native]
platform = native
lib_deps = throwtheswitch/Unity@^2.5.2
; Excluir src/ del build — los tests son autónomos
build_src_filter = -<*>
; Solo compilar la suite de unit tests
test_filter = test_unit

; ─────────────────────────────────────────────────────────────────────
; COVERAGE — igual que native pero con instrumentación gcov
; Ejecutar: pio test -e native-coverage
; Luego:    bash scripts/coverage.sh
; ─────────────────────────────────────────────────────────────────────
[env:native-coverage]
platform = native
lib_deps = throwtheswitch/Unity@^2.5.2
build_src_filter = -<*>
test_filter = test_unit
build_flags = -fprofile-arcs -ftest-coverage -lgcov

; ─────────────────────────────────────────────────────────────────────
; INTEGRATION TESTS — hardware real ESP32-S3-DevKitM-1
; Ejecutar: pio test -e esp32-s3-devkitm-1-test
; Requiere: ESP32-S3-DevKitM-1 conectado por USB
; Duración típica: 15-30 segundos
; ─────────────────────────────────────────────────────────────────────
[env:esp32-s3-devkitm-1-test]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
upload_speed = 921600
monitor_speed = 115200
lib_deps = throwtheswitch/Unity@^2.5.2
; Excluir src/ del build — evita compilar libiot.cpp/secrets.cpp
; que dependen de variables de entorno MQTT no disponibles en tests
build_src_filter = -<*>
; Solo compilar la suite de hardware tests
test_filter = test_hardware
